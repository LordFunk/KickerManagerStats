*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#f0f4f8;color:#222;display:flex;flex-direction:column;align-items:center;padding:2rem 1rem;min-height:100vh}
h2{max-width:1200px;width:100%;margin:0 0 1rem;font-weight:700;font-size:1.4rem;background:linear-gradient(90deg,#6a11cb,#2575fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.table-responsive{width:100%;max-width:1200px;overflow-x:auto;background:#fff;border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,.1);margin-bottom:2rem}
table{border-collapse:collapse;width:100%;min-width:700px}
thead{background:linear-gradient(90deg,#004e92,#000428);color:#fff;font-weight:700;font-size:.9rem;text-align:left;position:sticky;top:0;z-index:2}
thead th{padding:11px 14px;cursor:pointer;user-select:none;position:relative;white-space:nowrap}
thead th.sort-asc::after{content:" ▲";position:absolute;right:8px}
thead th.sort-desc::after{content:" ▼";position:absolute;right:8px}
tbody tr:nth-child(even){background:#f9fafb}
tbody tr:hover{background:#e1eaff}
tbody td{padding:10px 14px;font-size:.85rem;border-bottom:1px solid #ddd;white-space:nowrap}
.chart-container{width:90%;max-width:1200px;height:400px;background:#fff;border-radius:12px;box-shadow:0 4px 15px rgba(0,0,0,.05);padding:20px;margin-bottom:3rem}
ul#highlight-list{max-width:1200px;width:100%;background:#fff;border-radius:10px;box-shadow:0 6px 16px rgba(0,0,0,.1);padding:1rem 1.5rem;list-style:inside disc;color:#444;font-size:.92rem;line-height:1.6;max-height:400px;overflow-y:auto;margin-bottom:2rem}
@media(max-width:800px){body{padding:.5rem}.table-responsive{border-radius:0;box-shadow:none}tbody td,thead th{padding:7px 7px;font-size:.76rem}.chart-container{height:250px;padding:10px}h2{font-size:1.1rem}}

// ════════════════════════════════════════════════════════════════
// AUTO-CALCULATION ENGINE — no need to edit below this line
// ════════════════════════════════════════════════════════════════

function deriveMatchdayGains(cumulative) {
  return cumulative.map((v, i) => i === 0 ? v : v - cumulative[i - 1]);
}

function computeLeaderboardStats() {
  const players = Object.keys(playerPoints);
  const numMatchdays = Math.max(...players.map(p => playerPoints[p].length));

  const gains = {};
  players.forEach(p => { gains[p] = deriveMatchdayGains(playerPoints[p]); });

  const stats = {};
  players.forEach(p => {
    stats[p] = { spieltagssiege: 0, spieltagsletzter: 0, tabellenerster: 0, tabellenletzter: 0 };
  });

  for (let md = 0; md < numMatchdays; md++) {
    const active = players.filter(p => playerPoints[p].length > md);

    const mdGains = active.map(p => ({ p, g: gains[p][md] }));
    const maxGain = Math.max(...mdGains.map(x => x.g));
    const minGain = Math.min(...mdGains.map(x => x.g));
    mdGains.forEach(({ p, g }) => {
      if (g === maxGain) stats[p].spieltagssiege++;
      if (g === minGain) stats[p].spieltagsletzter++;
    });

    const cumuls = active.map(p => ({ p, c: playerPoints[p][md] }));
    const maxCumul = Math.max(...cumuls.map(x => x.c));
    const minCumul = Math.min(...cumuls.map(x => x.c));
    cumuls.forEach(({ p, c }) => {
      if (c === maxCumul) stats[p].tabellenerster++;
      if (c === minCumul) stats[p].tabellenletzter++;
    });
  }

  const rows = players.map(p => {
    const arr = playerPoints[p];
    const currentSeasonPoints = arr[arr.length - 1];
    const hist = historicalSeasonPoints[p] || {};
    const histTotal = Object.values(hist).reduce((a, b) => a + b, 0);
    const totalPunkte = histTotal + currentSeasonPoints;
    const histGames = Object.keys(hist).length * 34;
    const currentGames = arr.length;
    const totalSpiele = histGames + currentGames;
    const ml = historicalMeisterLetzter[p] || { meister: 0, letzter: 0 };
    return {
      spieler: p,
      spiele: totalSpiele,
      punkte: totalPunkte,
      avg: Math.round((totalPunkte / totalSpiele) * 100) / 100,
      meister: ml.meister,
      letzter: ml.letzter,
      ...stats[p]
    };
  });

  rows.sort((a, b) => b.punkte - a.punkte);
  rows.forEach((r, i) => r.platz = i + 1);
  return rows;
}

const leaderboardData = computeLeaderboardStats();

// ─── Rendering ───────────────────────────────────────────────────

function renderLeaderboard(data) {
  const tbody = document.querySelector('#leaderboard tbody');
  tbody.innerHTML = '';
  data.forEach(player => {
    const row = document.createElement('tr');
    ['platz','spieler','spiele','punkte','avg','meister','letzter','spieltagssiege','spieltagsletzter','tabellenerster','tabellenletzter'].forEach(key => {
      const td = document.createElement('td');
      let val = player[key];
      td.textContent = (val === null || val === undefined || val === '') ? '-' : val;
      row.appendChild(td);
    });
    tbody.appendChild(row);
  });
}

let currentSortKey = 'punkte', currentSortAsc = false;

function sortAndRender(key) {
  if (currentSortKey === key) currentSortAsc = !currentSortAsc;
  else { currentSortKey = key; currentSortAsc = false; }

  document.querySelectorAll('#leaderboard thead th').forEach(th => th.classList.remove('sort-asc','sort-desc'));
  const th = document.querySelector(`#leaderboard thead th[data-key="${key}"]`);
  if (th) th.classList.add(currentSortAsc ? 'sort-asc' : 'sort-desc');

  const sorted = [...leaderboardData].sort((a, b) => {
    let va = a[key], vb = b[key];
    if (typeof va === 'number' && typeof vb === 'number') return currentSortAsc ? va - vb : vb - va;
    va = String(va ?? ''); vb = String(vb ?? '');
    return currentSortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  renderLeaderboard(sorted);
}

document.querySelectorAll('#leaderboard thead th').forEach(th => {
  th.addEventListener('click', () => { if (th.dataset.key) sortAndRender(th.dataset.key); });
});

renderLeaderboard([...leaderboardData].sort((a, b) => b.punkte - a.punkte));
document.querySelector("#leaderboard thead th[data-key='punkte']").classList.add('sort-desc');

// ─── Fieberkurve Chart ────────────────────────────────────────────

const seasons = ['s1','s2','s3','s4','s5','s6'];
const seasonLabels = ['20/21','21/22','22/23','23/24','24/25','25/26'];

function buildFiebertabelleData() {
  const result = {};
  Object.keys(playerPoints).forEach(p => {
    const hist = historicalSeasonPoints[p] || {};
    const s6val = playerPoints[p][playerPoints[p].length - 1];
    result[p] = { ...hist, s6: s6val };
  });
  return result;
}

const fiebertabelleData = buildFiebertabelleData();

const colors = {
  'Markus':'#E41A1C','Erwin':'#377EB8','Phil':'#4DAF4A','Didi':'#984EA3',
  'Eirik':'#F781BF','Steffo':'#FF7F00','Basti':'#A65628','Emil':'#888888',
  'Kempka':'#66C2A5','Espen':'#CC9900','Alex':'#000000'
};

function cumulativeOverSeasons(seasonPoints) {
  let sum = 0;
  return seasons.map(s => {
    if (seasonPoints[s] !== undefined) { sum += seasonPoints[s]; return sum; }
    return null;
  });
}

const datasets = Object.keys(fiebertabelleData).map(name => ({
  label: name,
  data: cumulativeOverSeasons(fiebertabelleData[name]),
  borderColor: colors[name] || '#999',
  backgroundColor: colors[name] || '#999',
  fill: false, pointRadius: 4, borderWidth: 2, spanGaps: true
}));

const selectedIdx = new Set();
const allColors = Object.keys(fiebertabelleData).map(n => colors[n] || '#999');

const ctx = document.getElementById('fieberkurveChart').getContext('2d');
const fieberChart = new Chart(ctx, {
  type: 'line',
  data: { labels: seasonLabels, datasets },
  options: {
    responsive: true, maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true, position: 'top',
        labels: { usePointStyle: true, pointStyle: 'circle', color: '#222' },
        onClick: (e, item) => {
          const i = item.datasetIndex;
          selectedIdx.has(i) ? selectedIdx.delete(i) : selectedIdx.add(i);
          datasets.forEach((ds, j) => {
            if (selectedIdx.size === 0) {
              ds.borderColor = allColors[j]; ds.backgroundColor = allColors[j]; ds.borderWidth = 2;
            } else if (selectedIdx.has(j)) {
              ds.borderColor = allColors[j]; ds.backgroundColor = allColors[j]; ds.borderWidth = 4;
            } else {
              ds.borderColor = '#ccc'; ds.backgroundColor = '#ccc'; ds.borderWidth = 1;
            }
          });
          fieberChart.update();
        }
      },
      tooltip: { callbacks: { label: c => `${c.dataset.label}: ${c.parsed.y ?? '–'}` } }
    },
    scales: {
      y: { beginAtZero: true, title: { display: true, text: 'Kumulative Punkte' } },
      x: { title: { display: true, text: 'Saison' } }
    }
  }
});
