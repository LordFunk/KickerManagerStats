<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kicker Manager Stats 25-26</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI',Roboto,sans-serif;
margin:0;
padding:0;
background:linear-gradient(135deg,#e9eff5,#f9fafc);
color:#222;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin:25px 0;
font-size:1.8rem;
font-weight:700;
background:linear-gradient(90deg,#0056b3,#0091ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

section{
width:95%;
max-width:1200px;
margin-bottom:50px;
}

.chart{
height:60vh;
background:white;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
padding:15px;
}

.tables{
display:flex;
gap:15px;
flex-wrap:wrap;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
font-size:0.9rem;
}

th{background:#f0f0f0}
</style>
</head>

<body>

<h1>Kicker Manager Stats 25-26</h1>

<section class="chart">
<canvas id="chartSeason"></canvas>
</section>

<section class="chart">
<canvas id="chartMatchdayPoints"></canvas>
</section>

<section class="chart">
<canvas id="chartLeague"></canvas>
</section>

<section class="chart">
<canvas id="chartMatchdayRank"></canvas>
</section>

<section class="tables" id="tables"></section>

<script>

/* =========================
   ONLY EDIT THIS AFTER GAMEWEEK
   ========================= */
const playerPoints={
'Markus':[63, 131, 214, 277, 355, 395, 411, 493, 568, 613, 657, 683, 750, 798, 838, 907, 980, 1012, 1055, 1087, 1189, 1262, 1327, 1379, 1455, 1495, 1607, 1666, 1736, 1796, 1849, 1899, 1960, 2009],
'Erwin':[48, 118, 169, 247, 285, 295, 352, 417, 447, 488, 541, 600, 620, 684, 740, 807, 860, 878, 909, 943, 1044, 1068, 1132, 1162, 1221, 1264, 1320, 1382, 1433, 1501, 1530, 1582, 1617, 1722],
'Phil':[76, 148, 212, 270, 363, 405, 439, 482, 516, 571, 623, 643, 713, 805, 881, 932, 994, 1012, 1065, 1113, 1176, 1242, 1317, 1351, 1413, 1454, 1535, 1604, 1666, 1741, 1796, 1852, 1896, 1967],
'Didi':[50, 110, 195, 265, 310, 348, 392, 463, 491, 515, 566, 629, 685, 748, 789, 876, 958, 989, 1036, 1083, 1187, 1257, 1336, 1415, 1456, 1519, 1588, 1643, 1716, 1757, 1811, 1881, 1928, 1997],
'Steffo':[53, 108, 158, 202, 252, 274, 302, 347, 402, 456, 509, 564, 591, 628, 668, 715, 743, 772, 819, 883, 914, 960, 982, 1006, 1075, 1109, 1160, 1219, 1257, 1321, 1356, 1382, 1432, 1489],
'Basti':[47, 100, 144, 206, 273, 301, 338, 377, 423, 454, 493, 546, 597, 625, 665, 735, 766, 799, 813, 855, 908, 971, 997, 1025, 1073, 1095, 1145, 1173, 1208, 1278, 1330, 1352, 1406, 1490],
'Eirik':[46, 82, 116, 180, 217, 282, 356, 428, 492, 526, 602, 650, 706, 725, 752, 796, 828, 854, 893, 934, 983, 1025, 1091, 1156, 1217, 1268, 1352, 1448, 1534, 1614, 1667, 1739, 1774, 1853],
'Emil':[61, 118, 136, 171, 210, 212, 238, 248, 262, 295, 349, 395, 414, 481, 543, 618, 664, 704, 744, 775, 844, 885, 929, 992, 1059, 1081, 1138, 1160, 1184, 1247, 1276, 1290, 1324, 1358],
'Kempka':[36, 99, 131, 186, 241, 269, 324, 389, 429, 454, 518, 564, 606, 662, 672, 715, 767, 798, 855, 902, 978, 1026, 1106, 1158, 1208, 1256, 1337, 1417, 1502, 1574, 1649, 1703, 1736, 1823],
'Espen':[57, 102, 149, 198, 249, 251, 292, 353, 410, 422, 474, 499, 528, 575, 591, 632, 665, 678, 706, 741, 792, 821, 854, 850, 870, 909, 913, 931, 953, 969, 1001, 1032, 1057, 1125],
'Alex':[55, 121, 169, 194, 245, 322, 344, 395, 443, 507, 543, 585, 611, 641, 688, 746, 795, 847, 893, 949, 1016, 1057, 1134, 1173, 1230, 1273, 1338, 1395, 1448, 1511, 1546, 1602, 1626, 1660]
}

/* ========================= */

const players = Object.keys(playerPoints);
const colors = [
'#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00',
'#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'
];

const selected = new Set();

/* =========================
   HELPERS
   ========================= */

function matchdayPoints(cum){
return cum.map((v,i)=> i===0 ? v : v-cum[i-1]);
}

function leaguePositions(data){
const days=data[players[0]].length;
const pos={};
players.forEach(p=>pos[p]=[]);

for(let d=0;d<days;d++){
const r=players.map(p=>({p,pts:data[p][d]}))
.sort((a,b)=>b.pts-a.pts);
r.forEach((x,i)=>pos[x.p].push(i+1));
}
return pos;
}

function matchdayRanks(data){
const days=data[players[0]].length;
const pos={};
players.forEach(p=>pos[p]=[]);

for(let d=0;d<days;d++){
const r=players.map(p=>{
const pts=d===0?data[p][0]:data[p][d]-data[p][d-1];
return {p,pts};
}).sort((a,b)=>b.pts-a.pts);

r.forEach((x,i)=>pos[x.p].push(i+1));
}
return pos;
}

/* =========================
   DATA DERIVATION
   ========================= */

const mdPoints={};
players.forEach(p=>mdPoints[p]=matchdayPoints(playerPoints[p]));

const leaguePos=leaguePositions(playerPoints);
const mdRank=matchdayRanks(playerPoints);

const days = playerPoints[players[0]].length;
const labels = Array.from({length:days},(_,i)=>i+1);

/* =========================
   CHART BUILDER
   ========================= */

function buildChart(ctx,type,data,labelFunc){
return new Chart(ctx,{
type:'line',
data:{
labels,
datasets:players.map((p,i)=>({
label:p,
data:data[p],
borderColor:colors[i],
backgroundColor:colors[i],
borderWidth:2,
pointRadius:4
}))
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
onClick:(e,leg)=>{
const name=leg.text;
selected.has(name)?selected.delete(name):selected.add(name);

this.chart.data.datasets.forEach(d=>{
const i=players.indexOf(d.label);
if(selected.size===0||selected.has(d.label)){
d.borderColor=colors[i];
d.pointRadius=5;
d.borderWidth=3;
}else{
d.borderColor='lightgrey';
d.pointRadius=3;
d.borderWidth=1;
}
});
this.chart.update();
}
}
},
scales:{
x:{title:{display:true,text:'Spieltag'}},
y:{beginAtZero:true}
}
}
});
}

/* =========================
   CHARTS
   ========================= */

const ctx1=document.getElementById('chartSeason');
const ctx2=document.getElementById('chartMatchdayPoints');
const ctx3=document.getElementById('chartLeague');
const ctx4=document.getElementById('chartMatchdayRank');

const seasonChart = new Chart(ctx1,{
type:'line',
data:{labels,datasets:players.map((p,i)=>({
label:p,
data:playerPoints[p],
borderColor:colors[i],
backgroundColor:colors[i],
borderWidth:2,
pointRadius:4
}))}
});

const matchdayChart = new Chart(ctx2,{
type:'line',
data:{labels,datasets:players.map((p,i)=>({
label:p,
data:mdPoints[p],
borderColor:colors[i],
backgroundColor:colors[i],
borderWidth:2,
pointRadius:4
}))}
});

const leagueChart = new Chart(ctx3,{
type:'line',
data:{labels,datasets:players.map((p,i)=>({
label:p,
data:leaguePos[p],
borderColor:colors[i],
backgroundColor:colors[i],
borderWidth:2,
pointRadius:4
}))},
options:{scales:{y:{reverse:true,stepSize:1}}}
});

const rankChart = new Chart(ctx4,{
type:'line',
data:{labels,datasets:players.map((p,i)=>({
label:p,
data:mdRank[p],
borderColor:colors[i],
backgroundColor:colors[i],
borderWidth:2,
pointRadius:4
}))},
options:{scales:{y:{reverse:true,stepSize:1}}}
});

/* =========================
   TABLES (Hin + Rück)
   ========================= */

function segment(arr,start,end){
return arr[end-1]-(start>1?arr[start-2]:0);
}

const mid=Math.floor(days/2);

const hin = players.map(p=>({
name:p,
pts:segment(playerPoints[p],1,mid)
})).sort((a,b)=>b.pts-a.pts);

const rueck = players.map(p=>({
name:p,
pts:segment(playerPoints[p],mid+1,days)
})).sort((a,b)=>b.pts-a.pts);

const container=document.getElementById('tables');

function table(title,data){
const div=document.createElement('div');
div.innerHTML=`<h3>${title}</h3>`;
const t=document.createElement('table');

t.innerHTML=
`<tr><th>R</th><th>Player</th><th>Points</th></tr>`+
data.map((x,i)=>
`<tr><td>${i+1}</td><td>${x.name}</td><td>${x.pts}</td></tr>`
).join('');

div.appendChild(t);
return div;
}

container.appendChild(table('Hinrunde',hin));
container.appendChild(table('Rückrunde',rueck));

</script>
</body>
</html>
