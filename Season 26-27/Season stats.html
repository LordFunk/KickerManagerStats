<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season 26-27</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI',Roboto,sans-serif;
margin:0;
padding:0;
background:linear-gradient(135deg,#e9eff5,#f9fafc);
color:#222;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin:25px 0;
font-size:1.8rem;
font-weight:700;
background:linear-gradient(90deg,#0056b3,#0091ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.chart-container{
width:90%;
max-width:1200px;
height:60vh;
background:white;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
padding:20px;
margin-bottom:40px;
}

.tables-wrapper{
display:flex;
width:90%;
max-width:1200px;
justify-content:space-between;
gap:10px;
flex-wrap:wrap;
margin-bottom:40px;
}

.table-block{width:47%}

.table-title{
text-align:center;
font-weight:700;
margin-bottom:8px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
font-size:0.9rem;
}

th{background:#f0f0f0}
</style>
</head>

<body>

<h1>Kicker Manager Stats</h1>

<div class="chart-container"><canvas id="c1"></canvas></div>
<div class="chart-container"><canvas id="c2"></canvas></div>
<div class="chart-container"><canvas id="c3"></canvas></div>
<div class="chart-container"><canvas id="c4"></canvas></div>

<div class="tables-wrapper" id="tablesContainer"></div>

<script>

/* DATA (ONLY EDIT THIS) */
const playerPoints={
'Markus':[63,131,214,277,355,395,411,493,568,613,657,683,750,798,838,907,980,1012,1055,1087,1189,1262,1327,1379,1455,1495,1607,1666,1736,1796,1849,1899,1960,2009],
'Erwin':[48,118,169,247,285,295,352,417,447,488,541,600,620,684,740,807,860,878,909,943,1044,1068,1132,1162,1221,1264,1320,1382,1433,1501,1530,1582,1617,1722],
'Phil':[76,148,212,270,363,405,439,482,516,571,623,643,713,805,881,932,994,1012,1065,1113,1176,1242,1317,1351,1413,1454,1535,1604,1666,1741,1796,1852,1896,1967],
'Didi':[50,110,195,265,310,348,392,463,491,515,566,629,685,748,789,876,958,989,1036,1083,1187,1257,1336,1415,1456,1519,1588,1643,1716,1757,1811,1881,1928,1997],
'Steffo':[53,108,158,202,252,274,302,347,402,456,509,564,591,628,668,715,743,772,819,883,914,960,982,1006,1075,1109,1160,1219,1257,1321,1356,1382,1432,1489],
'Basti':[47,100,144,206,273,301,338,377,423,454,493,546,597,625,665,735,766,799,813,855,908,971,997,1025,1073,1095,1145,1173,1208,1278,1330,1352,1406,1490],
'Eirik':[46,82,116,180,217,282,356,428,492,526,602,650,706,725,752,796,828,854,893,934,983,1025,1091,1156,1217,1268,1352,1448,1534,1614,1667,1739,1774,1853],
'Emil':[61,118,136,171,210,212,238,248,262,295,349,395,414,481,543,618,664,704,744,775,844,885,929,992,1059,1081,1138,1160,1184,1247,1276,1290,1324,1358],
'Kempka':[36,99,131,186,241,269,324,389,429,454,518,564,606,662,672,715,767,798,855,902,978,1026,1106,1158,1208,1256,1337,1417,1502,1574,1649,1703,1736,1823],
'Espen':[57,102,149,198,249,251,292,353,410,422,474,499,528,575,591,632,665,678,706,741,792,821,854,850,870,909,913,931,953,969,1001,1032,1057,1125],
'Alex':[55,121,169,194,245,322,344,395,443,507,543,585,611,641,688,746,795,847,893,949,1016,1057,1134,1173,1230,1273,1338,1395,1448,1511,1546,1602,1626,1660]
};

const players = Object.keys(playerPoints);

const colors=[
'#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00',
'#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'
];

const selected = new Set();

const labels = Array.from({length: playerPoints[players[0]].length},(_,i)=>i+1);

/* HELPERS */
function mdPoints(arr){
return arr.map((v,i)=>i?v-arr[i-1]:v);
}

function leaguePos(data){
const d=data[players[0]].length;
const out={};
players.forEach(p=>out[p]=[]);
for(let i=0;i<d;i++){
const r=players.map(p=>({p,pts:data[p][i]}))
.sort((a,b)=>b.pts-a.pts);
r.forEach((x,i)=>out[x.p].push(i+1));
}
return out;
}

function mdRank(data){
const d=data[players[0]].length;
const out={};
players.forEach(p=>out[p]=[]);
for(let i=0;i<d;i++){
const r=players.map(p=>{
const pts=i?data[p][i]-data[p][i-1]:data[p][0];
return {p,pts};
}).sort((a,b)=>b.pts-a.pts);
r.forEach((x,i)=>out[x.p].push(i+1));
}
return out;
}

const md = Object.fromEntries(players.map(p=>[p, mdPoints(playerPoints[p])]));
const league = leaguePos(playerPoints);
const rank = mdRank(playerPoints);

/* HIN / RÜCK */
function segment(arr,start,end){
if(start>arr.length) return 0;
end=Math.min(end,arr.length);
return arr[end-1]-(start>1?arr[start-2]:0);
}

const played = playerPoints[players[0]].length;

const hinEnd = Math.min(17,played);
const rueckStart = 18;
const rueckEnd = played;

const hin = players.map(p=>({
name:p,
pts:segment(playerPoints[p],1,hinEnd)
})).sort((a,b)=>b.pts-a.pts);

const rueck = players.map(p=>({
name:p,
pts:segment(playerPoints[p],rueckStart,rueckEnd)
})).sort((a,b)=>b.pts-a.pts);

/* CHART FACTORY */
function makeChart(id,title,data,reverseY=false){

const chart = new Chart(document.getElementById(id),{
type:'line',
data:{
labels,
datasets:players.map((p,i)=>({
label:p,
data:data[p],
borderColor:colors[i],
backgroundColor:colors[i],
pointStyle:'circle',
pointRadius:4,
borderWidth:2
}))
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{usePointStyle:true,pointStyle:'circle'},
onClick:(e,leg)=>{
const name=leg.text;
selected.has(name)?selected.delete(name):selected.add(name);

chart.data.datasets.forEach(d=>{
const i=players.indexOf(d.label);

if(!selected.size||selected.has(d.label)){
d.borderColor=colors[i];
d.pointRadius=5;
d.borderWidth=3;
}else{
d.borderColor='lightgrey';
d.pointRadius=3;
d.borderWidth=1;
}
});

chart.update();
}
}
},
scales:{
x:{title:{display:true,text:'Spieltag'}},
y:{beginAtZero:false,reverse:reverseY}
}
}
});

chart.options.plugins.title={display:true,text:title};
}

/* CHARTS */
makeChart('c1','Saisonpunkte 26-27',playerPoints);
makeChart('c2','Punkte je Spieltag',md);
makeChart('c3','Tabellenplatzentwicklung',league,true);
makeChart('c4','Spieltagsplatzierung',rank,true);

/* TABLES */
function table(title,data){
const w=document.createElement('div');
w.className='table-block';

let html=`<div class="table-title">${title}</div><table>
<tr><th>Rang</th><th>Spieler</th><th>Punkte</th></tr>`;

data.forEach((d,i)=>{
html+=`<tr><td>${i+1}</td><td>${d.name}</td><td>${d.pts}</td></tr>`;
});

html+='</table>';
w.innerHTML=html;
return w;
}

const t=document.getElementById('tablesContainer');
t.appendChild(table('Hinrunde',hin));
t.appendChild(table('Rückrunde',rueck));

</script>

</body>
</html>
