<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kicker Manager Stats 26-27</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI',Roboto,sans-serif;
margin:0;
padding:0;
background:linear-gradient(135deg,#e9eff5,#f9fafc);
color:#222;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin:25px 0;
font-size:1.8rem;
font-weight:700;
background:linear-gradient(90deg,#0056b3,#0091ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.chart-container{
width:90%;
max-width:1200px;
height:60vh;
background:white;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
padding:20px;
margin-bottom:40px;
}

.tables-wrapper{
display:flex;
width:90%;
max-width:1200px;
justify-content:space-between;
margin-bottom:40px;
gap:10px;
flex-wrap:wrap;
}

.table-block{
width:47%;
}

.table-title{
text-align:center;
font-weight:700;
margin-bottom:8px;
font-size:1.1rem;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
font-size:0.9rem;
}

th{
background:#f0f0f0;
}
</style>
</head>

<body>

<h1>Kicker Manager Stats 26-27</h1>

<div class="chart-container">
<canvas id="c1"></canvas>
</div>

<div class="chart-container">
<canvas id="c2"></canvas>
</div>

<div class="chart-container">
<canvas id="c3"></canvas>
</div>

<div class="chart-container">
<canvas id="c4"></canvas>
</div>

<div class="tables-wrapper" id="tablesContainer"></div>

<script>

/* ONLY EDIT THIS */
const playerPoints = {
'Markus':[63,131,214],
'Erwin':[48,118,169],
'Phil':[76,148,212],
'Didi':[50,110,195],
'Steffo':[53,108,158],
'Basti':[47,100,144],
'Eirik':[46,82,116],
'Emil':[61,118,136],
'Kempka':[36,99,131],
'Espen':[57,102,149],
'Alex':[55,121,169]
};
/* ------------ */

const players=Object.keys(playerPoints);

const colors=[
'#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00',
'#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'
];

const selected=new Set();

/* HELPERS */
const mdPoints=a=>a.map((v,i)=>i? v-a[i-1]:v);

function leaguePos(data){
const d=data[players[0]].length;
const out={};
players.forEach(p=>out[p]=[]);
for(let i=0;i<d;i++){
const r=players.map(p=>({p,pts:data[p][i]})).sort((a,b)=>b.pts-a.pts);
r.forEach((x,i)=>out[x.p].push(i+1));
}
return out;
}

function mdRank(data){
const d=data[players[0]].length;
const out={};
players.forEach(p=>out[p]=[]);
for(let i=0;i<d;i++){
const r=players.map(p=>{
const pts=i?data[p][i]-data[p][i-1]:data[p][0];
return {p,pts};
}).sort((a,b)=>b.pts-a.pts);
r.forEach((x,i)=>out[x.p].push(i+1));
}
return out;
}

const md=Object.fromEntries(players.map(p=>[p,mdPoints(playerPoints[p])]));
const league=leaguePos(playerPoints);
const rank=mdRank(playerPoints);

const labels=Array.from({length:playerPoints[players[0]].length},(_,i)=>i+1);

/* CHART FACTORY */
function makeChart(id,title,data,reverseY=false){

new Chart(document.getElementById(id),{
type:'line',
data:{
labels,
datasets:players.map((p,i)=>({
label:p,
data:data[p],
borderColor:colors[i],
backgroundColor:colors[i],
pointStyle:'circle',
pointRadius:4,
borderWidth:2
}))
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
labels:{
usePointStyle:true,
pointStyle:'circle'
},
onClick:(e,leg)=>{
const n=leg.text;
selected.has(n)?selected.delete(n):selected.add(n);

this.chart.data.datasets.forEach(d=>{
const i=players.indexOf(d.label);
if(!selected.size||selected.has(d.label)){
d.borderColor=colors[i];
d.pointRadius=5;
d.borderWidth=3;
}else{
d.borderColor='lightgrey';
d.pointRadius=3;
d.borderWidth=1;
}
});
this.chart.update();
}
}
},
scales:{
x:{title:{display:true,text:'Spieltag'}},
y:{
beginAtZero:false,
reverse:reverseY
}
}
}
}).options.plugins.title={display:true,text:title};
}

/* CHARTS */
makeChart('c1','Saisonpunkte 26-27',playerPoints);
makeChart('c2','Punkte je Spieltag',md);
makeChart('c3','Tabellenplatzentwicklung',league,true);
makeChart('c4','Spieltagsplatzierung',rank,true);

/* TABLES (original style restored) */
function seg(a,s,e){
return a[e-1]-(s>1?a[s-2]:0);
}

const mid=Math.floor(labels.length/2);

const hin=players.map(p=>({name:p,pts:seg(playerPoints[p],1,mid)}))
.sort((a,b)=>b.pts-a.pts);

const rueck=players.map(p=>({name:p,pts:seg(playerPoints[p],mid+1,labels.length)}))
.sort((a,b)=>b.pts-a.pts);

const t=document.getElementById('tablesContainer');

function table(title,data){
const w=document.createElement('div');
w.className='table-block';

let html=`<div class="table-title">${title}</div><table>
<tr><th>Rang</th><th>Spieler</th><th>Punkte</th></tr>`;

data.forEach((d,i)=>{
html+=`<tr><td>${i+1}</td><td>${d.name}</td><td>${d.pts}</td></tr>`;
});

html+='</table>';
w.innerHTML=html;
return w;
}

t.appendChild(table('Hinrunde',hin));
t.appendChild(table('Rückrunde',rueck));

</script>

</body>
</html>
