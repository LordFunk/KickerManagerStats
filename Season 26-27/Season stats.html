<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season 26-27</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --card-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
}

*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #e9eff5, #f9fafc);
  color: #222;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  margin: 28px 0 4px;
  font-size: 1.9rem;
  font-weight: 700;
  background: linear-gradient(90deg, #0056b3, #0091ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.section-label {
  width: 90%;
  max-width: 1200px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #aaa;
  border-bottom: 1px solid #dde3ea;
  margin-top: 28px;
  padding-bottom: 6px;
}

.chart-container {
  width: 90%;
  max-width: 1200px;
  background: white;
  border-radius: 14px;
  box-shadow: var(--card-shadow);
  padding: 20px;
  margin-bottom: 24px;
  aspect-ratio: 2.4 / 1;
  min-height: 280px;
  max-height: 520px;
}

.tables-wrapper {
  display: flex;
  width: 90%;
  max-width: 1200px;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 48px;
}

.table-block { width: 47%; }

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: var(--card-shadow);
}

thead tr { background: #f4f6f9; }

th, td {
  padding: 8px;
  text-align: center;
  font-size: 0.85rem;
}

tbody tr:nth-child(even) td { background: #fafbfc; }
tbody tr.rank-1 td { background: #fffbea !important; }

.rank-badge {
  display: inline-flex;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  align-items: center;
  justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  background: #eef0f3;
}

.rank-badge.gold {
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: white;
}

.player-cell {
  display: flex;
  gap: 7px;
  align-items: center;
  justify-content: flex-start;
}

.player-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
}

.diff-pos { color: #1a8a1a; font-weight: 700; }
.diff-neg { color: #cc1a1a; font-weight: 700; }
.diff-zero { color: #888; font-weight: 700; }

@media (max-width: 640px) {
  .chart-container { width: 96%; aspect-ratio: unset; height: 52vw; }
  .tables-wrapper { flex-direction: column; width: 96%; }
  .table-block { width: 100%; }
}
</style>
</head>

<body>
<h1>Kicker Interactive Manager Season 26-27</h1>

<script>
/* ───────── CONFIG ───────── */
const SEASON_SPLIT = 17;

const playerPoints = {
  Markus: [63,131,214,277,355,395,411,493,568,613,657,683,750,798,838,907,980,1012,1055,1087,1189,1262,1327,1379,1455,1495,1607,1666,1736,1796,1849,1899,1960,2009],
  Erwin:  [48,118,169,247,285,295,352,417,447,488,541,600,620,684,740,807,860,878,909,943,1044,1068,1132,1162,1221,1264,1320,1382,1433,1501,1530,1582,1617,1722],
  Phil:   [76,148,212,270,363,405,439,482,516,571,623,643,713,805,881,932,994,1012,1065,1113,1176,1242,1317,1351,1413,1454,1535,1604,1666,1741,1796,1852,1896,1967],
  Didi:   [50,110,195,265,310,348,392,463,491,515,566,629,685,748,789,876,958,989,1036,1083,1187,1257,1336,1415,1456,1519,1588,1643,1716,1757,1811,1881,1928,1997],
  Steffo: [53,108,158,202,252,274,302,347,402,456,509,564,591,628,668,715,743,772,819,883,914,960,982,1006,1075,1109,1160,1219,1257,1321,1356,1382,1432,1489],
  Basti:  [47,100,144,206,273,301,338,377,423,454,493,546,597,625,665,735,766,799,813,855,908,971,997,1025,1073,1095,1145,1173,1208,1278,1330,1352,1406,1490],
  Eirik:  [46,82,116,180,217,282,356,428,492,526,602,650,706,725,752,796,828,854,893,934,983,1025,1091,1156,1217,1268,1352,1448,1534,1614,1667,1739,1774,1853],
  Emil:   [61,118,136,171,210,212,238,248,262,295,349,395,414,481,543,618,664,704,744,775,844,885,929,992,1059,1081,1138,1160,1184,1247,1276,1290,1324,1358],
  Kempka: [36,99,131,186,241,269,324,389,429,454,518,564,606,662,672,715,767,798,855,902,978,1026,1106,1158,1208,1256,1337,1417,1502,1574,1649,1703,1736,1823],
  Espen:  [57,102,149,198,249,251,292,353,410,422,474,499,528,575,591,632,665,678,706,741,792,821,854,850,870,909,913,931,953,969,1001,1032,1057,1125],
  Alex:   [55,121,169,194,245,322,344,395,443,507,543,585,611,641,688,746,795,847,893,949,1016,1057,1134,1173,1230,1273,1338,1395,1448,1511,1546,1602,1626,1660]
};

const players = Object.keys(playerPoints);
const GAME_COUNT = playerPoints[players[0]].length;

const colors = ['#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00','#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'];
const colorMap = Object.fromEntries(players.map((p,i)=>[p,colors[i]]));

const labels = Array.from({length: GAME_COUNT}, (_,i)=>i+1);

/* ───────── HELPERS ───────── */
const mdPoints = arr => arr.map((v,i)=>i?v-arr[i-1]:v);

function rankByGame(data, mode="total") {
  const out = Object.fromEntries(players.map(p=>[p,[]]));

  for (let i=0;i<GAME_COUNT;i++) {
    const arr = players.map(p=>{
      const pts = mode==="total" ? data[p][i] : mdPoints(data[p])[i];
      return {p,pts};
    }).sort((a,b)=>b.pts-a.pts);

    arr.forEach((x,idx)=>out[x.p].push(idx+1));
  }
  return out;
}

function leaguePos(data){ return rankByGame(data,"total"); }
function mdRank(data){ return rankByGame(data,"md"); }

/* ───────── SEGMENTS ───────── */
function segmentPts(arr,start,end){
  const e = Math.min(end,arr.length-1);
  return arr[e] - (start>0?arr[start-1]:0);
}

const hinEnd = Math.min(SEASON_SPLIT, GAME_COUNT-1);

const hin = players.map(p=>({
  name:p,
  pts:segmentPts(playerPoints[p],0,hinEnd)
})).sort((a,b)=>b.pts-a.pts);

const rueck = players.map(p=>({
  name:p,
  pts:segmentPts(playerPoints[p],SEASON_SPLIT,GAME_COUNT-1),
  diff:0
})).sort((a,b)=>b.pts-a.pts);

/* ───────── CHARTS ───────── */
const charts = [];
const selected = new Set();

function applyFade(){
  charts.forEach(c=>{
    c.data.datasets.forEach(ds=>{
      const active = selected.size===0 || selected.has(ds.label);
      const col = colorMap[ds.label];

      ds.borderColor = active ? col : "lightgrey";
      ds.backgroundColor = active ? col : "lightgrey";
      ds.pointBackgroundColor = active ? col : "lightgrey";
      ds.pointRadius = active ? 4 : 3;
      ds.borderWidth = active ? 2 : 1;
    });
    c.update();
  });
}

function legendClick(e,item){
  const name = item.text;
  selected.has(name)?selected.delete(name):selected.add(name);
  applyFade();
}

/* ───────── CHART FACTORY ───────── */
function makeChart(id,title,data,reverse=false){
  const mobile = window.innerWidth<=640;

  const chart = new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels,
      datasets:players.map((p,i)=>({
        label:p,
        data:data[p],
        borderColor:colors[i],
        backgroundColor:colors[i],
        pointBackgroundColor:colors[i],
        pointRadius:mobile?2:4,
        borderWidth:mobile?1.5:2
      }))
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{
          position:'bottom',
          onClick:legendClick
        },
        title:{display:true,text:title},
        tooltip:{position:'nearest'}
      },
      scales:{
        x:{grid:{color:'#f0f2f5'}},
        y:{reverse}
      }
    }
  });

  charts.push(chart);
}

/* ───────── DOM BUILD ───────── */
function el(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}

function addSection(t){
  const s=el('div','section-label');
  s.textContent=t;
  document.body.appendChild(s);
}

function addChart(id){
  const c=el('div','chart-container');
  const canvas=el('canvas');
  canvas.id=id;
  c.appendChild(canvas);
  document.body.appendChild(c);
}

/* charts */
addSection('');
addChart('c1');
addSection('');
addChart('c2');
addSection('');
addChart('c3');
addSection('');
addChart('c4');

makeChart('c1','Saisonpunkte 26-27',playerPoints);
makeChart('c2','Punkte je Spieltag',mdPoints);
makeChart('c3','Tabellenplatzentwicklung',leaguePos,true);
makeChart('c4','Spieltagsplatzierung',mdRank,true);

/* ───────── TABLES ───────── */
const wrapper = el('div','tables-wrapper');
document.body.appendChild(wrapper);

function playerCell(name){
  return `<div class="player-cell">
    <span class="player-dot" style="background:${colorMap[name]}"></span>
    <span>${name}</span>
  </div>`;
}

function table(title,data,extra=false){
  const div=el('div','table-block');

  let html=`<div class="table-title">${title}</div>
  <table><thead><tr><th>Rang</th><th>Player</th><th>P</th>${extra?'<th>D</th>':''}</tr></thead><tbody>`;

  data.forEach((d,i)=>{
    const first=i===0;
    const diff=d.diff||0;

    html+=`<tr class="${first?'rank-1':''}">
      <td><span class="rank-badge ${first?'gold':''}">${i+1}</span></td>
      <td>${playerCell(d.name)}</td>
      <td>${d.pts}</td>
      ${extra?`<td>${diff>0?'+':''}${diff}</td>`:''}
    </tr>`;
  });

  html+='</tbody></table>';
  div.innerHTML=html;
  return div;
}

wrapper.appendChild(table('Hinrunde',hin));
wrapper.appendChild(table('Rückrunde',rueck,true));

</script>
</body>
</html>
