<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season 26-27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; }

body {
  font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
  margin: 0;
  padding: 0;
  background: linear-gradient(135deg, #e9eff5, #f9fafc);
  color: #222;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
}

h1 {
  margin: 28px 0 4px;
  font-size: 1.9rem;
  font-weight: 700;
  background: linear-gradient(90deg, #0056b3, #0091ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-align: center;
}

.hint {
  font-size: 0.78rem;
  color: #888;
  margin: 0 0 20px;
  text-align: center;
  letter-spacing: 0.01em;
}

/* ── Section labels ── */
.section-label {
  width: 90%;
  max-width: 1200px;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: #aaa;
  padding: 0 4px 6px;
  border-bottom: 1px solid #dde3ea;
  margin-bottom: 0;
  margin-top: 28px;
}
.section-label:first-of-type { margin-top: 4px; }

/* ── Chart cards ── */
.chart-container {
  width: 90%;
  max-width: 1200px;
  background: white;
  border-radius: 14px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
  padding: 20px 20px 16px;
  margin-bottom: 24px;
  /* Aspect-ratio sizing: default ~2.4:1, clamped */
  aspect-ratio: 2.4 / 1;
  min-height: 280px;
  max-height: 520px;
  position: relative;
}

/* ── Tables ── */
.tables-wrapper {
  display: flex;
  width: 90%;
  max-width: 1200px;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 48px;
  margin-top: 12px;
}

.table-block { width: 47%; }

.table-title {
  text-align: center;
  font-weight: 700;
  margin-bottom: 10px;
  font-size: 1.05rem;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
}

thead tr { background: #f4f6f9; }

th {
  padding: 9px 10px;
  text-align: center;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #777;
  border-bottom: 1px solid #e8ecf0;
}

td {
  padding: 8px 10px;
  text-align: center;
  border-bottom: 1px solid #f0f2f5;
  font-size: 0.875rem;
}

/* Zebra striping */
tbody tr:nth-child(even) td { background: #fafbfc; }
tbody tr:last-child td { border-bottom: none; }

/* Gold row for rank 1 */
tbody tr.rank-1 td {
  background: #fffbea !important;
}

/* Rank badge */
.rank-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 22px;
  height: 22px;
  border-radius: 50%;
  font-size: 0.75rem;
  font-weight: 700;
  background: #eef0f3;
  color: #555;
}
.rank-badge.gold {
  background: linear-gradient(135deg, #f6d365, #fda085);
  color: white;
}

/* Player name with colored dot */
.player-cell {
  display: flex;
  align-items: center;
  gap: 7px;
  justify-content: flex-start;
  padding-left: 4px;
}
.player-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Diff colors */
.diff-pos  { color: #1a8a1a; font-weight: 700; }
.diff-neg  { color: #cc1a1a; font-weight: 700; }
.diff-zero { color: #888;    font-weight: 700; }

/* ── Responsive ── */
@media (max-width: 640px) {
  h1 { font-size: 1.35rem; margin: 18px 0 4px; }
  .hint { font-size: 0.72rem; }
  .section-label { font-size: 0.65rem; margin-top: 20px; }

  .chart-container {
    width: 96%;
    aspect-ratio: unset;
    height: 52vw;
    min-height: 200px;
    max-height: 300px;
    padding: 12px 10px 10px;
    margin-bottom: 16px;
    border-radius: 10px;
  }

  .tables-wrapper {
    width: 96%;
    flex-direction: column;
    gap: 14px;
  }
  .table-block { width: 100%; }

  .table-title { font-size: 0.9rem; }
  th { font-size: 0.62rem; padding: 7px 6px; }
  td { font-size: 0.8rem; padding: 6px 6px; }
  .player-dot { width: 8px; height: 8px; }
  .rank-badge { width: 19px; height: 19px; font-size: 0.68rem; }
}
</style>
</head>

<body>

<h1>Kicker Interactive Manager Season 26-27</h1>

<script>
/* ─── DATA ─── */
const playerPoints = {
  'Markus': [97,205],
  'Erwin':  [125,223],
  'Phil':   [84,161],
  'Didi':   [58,142],
  'Steffo': [84,],
  'Basti':  [104,200],
  'Eirik':  [84,175],
  'Emil':   [78,158],
  'Kempka': [74,163],
  'Espen':  [70,140],
  'Alex':   [52,100]
};

const players = Object.keys(playerPoints);

const colors = [
  '#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00',
  '#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'
];

const colorMap = Object.fromEntries(players.map((p,i) => [p, colors[i]]));

const labels = Array.from({ length: playerPoints[players[0]].length }, (_, i) => i + 1);

/* ─── HELPERS ─── */
function mdPoints(arr) {
  return arr.map((v, i) => i ? v - arr[i-1] : v);
}
function leaguePos(data) {
  const d = data[players[0]].length;
  const out = {};
  players.forEach(p => out[p] = []);
  for (let i = 0; i < d; i++) {
    const r = players.map(p => ({ p, pts: data[p][i] })).sort((a,b) => b.pts - a.pts);
    r.forEach((x, i) => out[x.p].push(i + 1));
  }
  return out;
}
function mdRank(data) {
  const d = data[players[0]].length;
  const out = {};
  players.forEach(p => out[p] = []);
  for (let i = 0; i < d; i++) {
    const r = players.map(p => {
      const pts = i ? data[p][i] - data[p][i-1] : data[p][0];
      return { p, pts };
    }).sort((a,b) => b.pts - a.pts);
    r.forEach((x, i) => out[x.p].push(i + 1));
  }
  return out;
}

const md     = Object.fromEntries(players.map(p => [p, mdPoints(playerPoints[p])]));
const league = leaguePos(playerPoints);
const rank   = mdRank(playerPoints);

/* ─── SEGMENTS ─── */
const played     = playerPoints[players[0]].length;
const hinEnd     = Math.min(17, played);
const rueckStart = 17;
const rueckEnd   = played - 1;

function segmentPts(arr, startIdx, endIdx) {
  if (startIdx > arr.length - 1) return 0;
  const end = Math.min(endIdx, arr.length - 1);
  return arr[end] - (startIdx > 0 ? arr[startIdx - 1] : 0);
}

const hinPtsMap  = {};
const rueckPtsMap = {};
players.forEach(p => {
  hinPtsMap[p]   = segmentPts(playerPoints[p], 0, hinEnd - 1);
  rueckPtsMap[p] = segmentPts(playerPoints[p], rueckStart, rueckEnd);
});

const hin  = players.map(p => ({ name: p, pts: hinPtsMap[p] })).sort((a,b) => b.pts - a.pts);
const rueck= players.map(p => ({ name: p, pts: rueckPtsMap[p], diff: rueckPtsMap[p] - hinPtsMap[p] })).sort((a,b) => b.pts - a.pts);

/* ─── SHARED FADE STATE ─── */
const selectedPlayers = new Set();
const allCharts = [];

function applyFade() {
  allCharts.forEach(chart => {
    chart.data.datasets.forEach(dataset => {
      const idx          = players.indexOf(dataset.label);
      const isSelected   = selectedPlayers.has(dataset.label);
      const noneSelected = selectedPlayers.size === 0;

      if (noneSelected || isSelected) {
        const col = colors[idx];
        dataset.borderColor          = col;
        dataset.backgroundColor      = col;
        dataset.pointBackgroundColor = col;
        dataset.pointBorderColor     = col;
        dataset.borderWidth          = isSelected ? 3 : 2;
        dataset.pointRadius          = isSelected ? 6 : 4;
        dataset.pointHoverRadius     = isSelected ? 7 : 5;
      } else {
        dataset.borderColor          = 'lightgrey';
        dataset.backgroundColor      = 'lightgrey';
        dataset.pointBackgroundColor = 'lightgrey';
        dataset.pointBorderColor     = 'lightgrey';
        dataset.borderWidth          = 1;
        dataset.pointRadius          = 3;
        dataset.pointHoverRadius     = 4;
      }
    });
    chart.update();
  });
}

function legendClickHandler(e, legendItem) {
  const clicked = legendItem.text;
  if (selectedPlayers.has(clicked)) {
    selectedPlayers.delete(clicked);
  } else {
    selectedPlayers.add(clicked);
  }
  applyFade();
}

/* ─── CHART FACTORY ─── */
function isMobile() { return window.innerWidth <= 640; }

/* Register a custom tooltip positioner that pins the tooltip to the top of the chart area */
Chart.Tooltip.positioners.side = function(elements, eventPosition) {
  const chart = this.chart;
  if (!elements.length) return false;

  const x = elements[0].element.x;
  const chartArea = chart.chartArea;

  const totalGamedays = chart.data.labels.length;
  const chartWidth = chartArea.right - chartArea.left;
  const spacingPer = chartWidth / (totalGamedays - 1);
  const offset = spacingPer * 2 + 12;

  // Get the hovered gameday index to decide which side
  const hoveredIndex = elements[0].index;
  const goLeft = hoveredIndex >= 17;

  const tooltipWidth = this.width || 160;
  return {
    x: goLeft ? x - offset - tooltipWidth : x + offset,
    y: (chartArea.top + chartArea.bottom) / 2
  };
};

function makeChart(id, title, data, reverseY = false) {
  const mobile = isMobile();
  const chart = new Chart(document.getElementById(id), {
    type: 'line',
    data: {
      labels,
      datasets: players.map((p, i) => ({
        label:                p,
        data:                 data[p],
        borderColor:          colors[i],
        backgroundColor:      colors[i],
        pointBackgroundColor: colors[i],
        pointBorderColor:     colors[i],
        pointBorderWidth:     0,
        pointStyle:           'circle',
        pointRadius:          mobile ? 2 : 4,
        pointHoverRadius:     mobile ? 4 : 6,
        borderWidth:          mobile ? 1.5 : 2
      }))
    },
    options: {
      responsive:          true,
      maintainAspectRatio: false,
      interaction: {
        mode:      'index',
        intersect: false
      },
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            usePointStyle: true,
            pointStyle:    'circle',
            boxWidth:      8,
            boxHeight:     8,
            padding:       mobile ? 8 : 14,
            font: { size: mobile ? 10 : 12 }
          },
          onClick: legendClickHandler
        },
        title: {
          display: true,
          text:    title,
          font: { size: mobile ? 14 : 20, weight: 'bold' },
          padding: { top: 4, bottom: 14 },
          color: '#111'
        },
        tooltip: {
          backgroundColor: 'white',
          borderColor:     '#dde3ea',
          borderWidth:     1,
          titleColor:      '#555',
          bodyColor:       '#222',
          padding:         10,
          boxWidth:        10,
          boxHeight:       10,
          usePointStyle:   true,
          position:        'side',
          xAlign:          'left',
          yAlign:          'center',
          caretSize:       0,
          caretPadding:    8,
          callbacks: {
            labelColor: function(context) {
              const col = colors[players.indexOf(context.dataset.label)];
              return { borderColor: col, backgroundColor: col, borderWidth: 2 };
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: !mobile, text: 'Spieltag' },
          ticks: {
            maxTicksLimit: mobile ? 10 : 34,
            font: { size: mobile ? 9 : 11 }
          },
          grid: { color: '#f0f2f5' }
        },
        y: {
          beginAtZero: false,
          reverse:     reverseY,
          ticks: { font: { size: mobile ? 9 : 11 } },
          grid: { color: '#f0f2f5' }
        }
      }
    }
  });
  allCharts.push(chart);
  return chart;
}

/* ─── SECTION LABELS + CHARTS ─── */
function addSection(text) {
  const el = document.createElement('div');
  el.className = 'section-label';
  el.textContent = text;
  document.body.appendChild(el);
}
function addChartContainer(id) {
  const div = document.createElement('div');
  div.className = 'chart-container';
  const canvas = document.createElement('canvas');
  canvas.id = id;
  div.appendChild(canvas);
  document.body.appendChild(div);
}

addSection('');
addChartContainer('c1');
addSection('');
addChartContainer('c2');
addSection('');
addChartContainer('c3');
addSection('');
addChartContainer('c4');

makeChart('c1', 'Saisonpunkte 26-27',         playerPoints);
makeChart('c2', 'Punkte je Spieltag',          md);
makeChart('c3', 'Tabellenplatzentwicklung',    league, true);
makeChart('c4', 'Spieltagsplatzierung',        rank,   true);

/* ─── TABLES ─── */
const tablesSection = document.createElement('div');
tablesSection.className = 'section-label';
tablesSection.textContent = 'Hin- & Rückrunde';
document.body.appendChild(tablesSection);

const tablesWrapper = document.createElement('div');
tablesWrapper.className = 'tables-wrapper';
document.body.appendChild(tablesWrapper);

function playerNameCell(name) {
  const col = colorMap[name];
  return `<div class="player-cell">
    <span class="player-dot" style="background:${col}"></span>
    <span>${name}</span>
  </div>`;
}

function hinTable(title, data) {
  const w = document.createElement('div');
  w.className = 'table-block';
  let html = `<div class="table-title">${title} <span style="font-size:0.72rem;font-weight:400;color:#888">(Spieltag 1–${hinEnd})</span></div>
  <table>
    <thead><tr><th>Rang</th><th>Spieler</th><th>Punkte</th></tr></thead>
    <tbody>`;
  data.forEach((d, i) => {
    const isFirst = i === 0;
    const badgeClass = isFirst ? 'rank-badge gold' : 'rank-badge';
    html += `<tr class="${isFirst ? 'rank-1' : ''}">
      <td><span class="${badgeClass}">${i+1}</span></td>
      <td>${playerNameCell(d.name)}</td>
      <td>${d.pts}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  w.innerHTML = html;
  return w;
}

function rueckTable(title, data) {
  const w = document.createElement('div');
  w.className = 'table-block';
  const rueckLabel = played > hinEnd ? `${hinEnd+1}–${played}` : '—';
  let html = `<div class="table-title">${title} <span style="font-size:0.72rem;font-weight:400;color:#888">(Spieltag ${rueckLabel})</span></div>
  <table>
    <thead><tr><th>Rang</th><th>Spieler</th><th>Punkte</th><th>Diff</th></tr></thead>
    <tbody>`;
  data.forEach((d, i) => {
    const isFirst = i === 0;
    const badgeClass = isFirst ? 'rank-badge gold' : 'rank-badge';
    const diff = d.diff;
    let cls, str;
    if (diff > 0)       { cls = 'diff-pos'; str = '+' + diff; }
    else if (diff < 0)  { cls = 'diff-neg'; str = '' + diff;  }
    else                { cls = 'diff-zero'; str = '±0';       }
    html += `<tr class="${isFirst ? 'rank-1' : ''}">
      <td><span class="${badgeClass}">${i+1}</span></td>
      <td>${playerNameCell(d.name)}</td>
      <td>${d.pts}</td>
      <td class="${cls}">${str}</td>
    </tr>`;
  });
  html += '</tbody></table>';
  w.innerHTML = html;
  return w;
}

tablesWrapper.appendChild(hinTable('Hinrunde', hin));
tablesWrapper.appendChild(rueckTable('Rückrunde', rueck));
</script>
</body>
</html>
