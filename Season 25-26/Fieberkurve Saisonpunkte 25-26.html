<head>

<style>

</head>
<body>

<h1>Saisonpunkte 25-26</h1>

<div class="tables-wrapper" id="tablesContainer"></div>

<script>
const playerPoints = {
'Markus':[63,131,214,277,355,395,411,493,568,613,657,683,750,798,838,907,980,1012,1055,1087,1189,1262,1327,1379,1455],
'Erwin':[48,118,169,247,285,295,352,417,447,488,541,600,620,684,740,807,860,878,909,943,1044,1068,1132,1162,1221],
'Phil':[76,148,212,270,363,405,439,482,516,571,623,643,713,805,881,932,994,1012,1065,1113,1176,1242,1317,1351,1413],
'Didi':[50,110,195,265,310,348,392,463,491,515,566,629,685,748,789,876,958,989,1036,1083,1187,1257,1336,1415,1456],
'Steffo':[53,108,158,202,252,274,302,347,402,456,509,564,591,628,668,715,743,772,819,883,914,960,982,1006,1075],
'Basti':[47,100,144,206,273,301,338,377,423,454,493,546,597,625,665,735,766,799,813,855,908,971,997,1025,1073],
'Eirik':[46,82,116,180,217,282,356,428,492,526,602,650,706,725,752,796,828,854,893,934,983,1025,1091,1156,1217],
'Emil':[61,118,136,171,210,212,238,248,262,295,349,395,414,481,543,618,664,704,744,775,844,885,929,992,1059],
'Kempka':[36,99,131,186,241,269,324,389,429,454,518,564,606,662,672,715,767,798,855,902,978,1026,1106,1158,1208],
'Espen':[57,102,149,198,249,251,292,353,410,422,474,499,528,575,591,632,665,678,706,741,792,821,854,850,870],
'Alex':[55,121,169,194,245,322,344,395,443,507,543,585,611,641,688,746,795,847,893,949,1016,1057,1134,1173,1230]
}

const players = Object.keys(playerPoints)
const totalSpieltag = playerPoints[players[0]].length

function createTable(title, startSpieltag, endSpieltag){
  const table = document.createElement('table')
  let html = `<tr><th colspan="${3 + endSpieltag - startSpieltag + 1}">${title}</th></tr>`
  
  // Header row: Player | Spieltag numbers
  html += '<tr><th>Rang</th><th>Spieler</th>'
  for(let i=startSpieltag;i<=endSpieltag;i++) html += `<th>${i}</th>`
  html += '</tr>'
  
  // Calculate points per player
  const rows = players.map(name=>{
    const points = playerPoints[name].slice(startSpieltag-1, endSpieltag)
    const diffs = points.map((p,i)=>i>0?p-points[i-1]:p)
    return {name, points, diffs, total: points.reduce((a,b)=>a+b,0)}
  })
  
  // Sort by total points in this segment
  rows.sort((a,b)=>b.total-a.total)
  
  rows.forEach((row,i)=>{
    html += `<tr><td>${i+1}</td><td>${row.name}</td>`
    row.diffs.forEach(d=>html += `<td>${d}</td>`)
    html += '</tr>'
    // optional cumulative row underneath
    html += `<tr><td></td><td>Cum.</td>`
    let cum=0
    row.points.forEach(p=>{cum+=p; html += `<td>${cum}</td>`})
    html += '</tr>'
  })
  
  table.innerHTML = html
  return table
}

const container = document.getElementById('tablesContainer')
container.appendChild(createTable('Hinrunde', 1, 8))
container.appendChild(createTable('Rückrunde', 18, 25))
</script>

</body>
</html>
