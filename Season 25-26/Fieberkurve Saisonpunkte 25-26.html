<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saisonpunkte 25-26</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Segoe UI',Roboto,sans-serif;
margin:0;
padding:0;
background:linear-gradient(135deg,#e9eff5,#f9fafc);
color:#222;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
margin:30px 0 20px 0;
font-size:2rem;
font-weight:700;
background:linear-gradient(90deg,#0056b3,#0091ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-align:center;
}

.chart-container{
width:90%;
max-width:1200px;
height:60vh;
background:white;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
padding:20px;
margin-bottom:40px;
}

.tables-wrapper{
display:flex;
width:90%;
max-width:1200px;
justify-content:space-between;
margin-bottom:40px;
gap:10px;
flex-wrap:wrap;
}

.table-block{
width:47%;
}

.table-title{
text-align:center;
font-weight:700;
margin-bottom:8px;
font-size:1.1rem;
}

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

th,td{
padding:8px;
text-align:center;
border-bottom:1px solid #ddd;
font-size:0.9rem;
}

th{
background:#f0f0f0;
white-space:nowrap;
}

@media (max-width:768px) and (orientation:portrait){
.tables-wrapper{
flex-direction:column;
}
.table-block{
width:100%;
}
}
</style>
</head>

<body>

<h1>Saisonpunkte 25-26</h1>

<div class="chart-container">
<canvas id="fieberkurveChart"></canvas>
</div>

<div class="tables-wrapper" id="tablesContainer"></div>

<script>

const playerPoints={
const playerPoints={
'Markus':[63, 131, 214, 277, 355, 395, 411, 493, 568, 613, 657, 683, 750, 798, 838, 907, 980, 1012, 1055, 1087, 1189, 1262, 1327, 1379, 1455, 1495, 1607],
'Erwin':[48, 118, 169, 247, 285, 295, 352, 417, 447, 488, 541, 600, 620, 684, 740, 807, 860, 878, 909, 943, 1044, 1068, 1132, 1162, 1221, 1264, 1320],
'Phil':[76, 148, 212, 270, 363, 405, 439, 482, 516, 571, 623, 643, 713, 805, 881, 932, 994, 1012, 1065, 1113, 1176, 1242, 1317, 1351, 1413, 1454, 1535],
'Didi':[50, 110, 195, 265, 310, 348, 392, 463, 491, 515, 566, 629, 685, 748, 789, 876, 958, 989, 1036, 1083, 1187, 1257, 1336, 1415, 1456, 1519, 1588],
'Steffo':[53, 108, 158, 202, 252, 274, 302, 347, 402, 456, 509, 564, 591, 628, 668, 715, 743, 772, 819, 883, 914, 960, 982, 1006, 1075, 1109, 1160],
'Basti':[47, 100, 144, 206, 273, 301, 338, 377, 423, 454, 493, 546, 597, 625, 665, 735, 766, 799, 813, 855, 908, 971, 997, 1025, 1073, 1095, 1145],
'Eirik':[46, 82, 116, 180, 217, 282, 356, 428, 492, 526, 602, 650, 706, 725, 752, 796, 828, 854, 893, 934, 983, 1025, 1091, 1156, 1217, 1268, 1352],
'Emil':[61, 118, 136, 171, 210, 212, 238, 248, 262, 295, 349, 395, 414, 481, 543, 618, 664, 704, 744, 775, 844, 885, 929, 992, 1059, 1081, 1138],
'Kempka':[36, 99, 131, 186, 241, 269, 324, 389, 429, 454, 518, 564, 606, 662, 672, 715, 767, 798, 855, 902, 978, 1026, 1106, 1158, 1208, 1256, 1337],
'Espen':[57, 102, 149, 198, 249, 251, 292, 353, 410, 422, 474, 499, 528, 575, 591, 632, 665, 678, 706, 741, 792, 821, 854, 850, 870, 909, 913],
'Alex':[55, 121, 169, 194, 245, 322, 344, 395, 443, 507, 543, 585, 611, 641, 688, 746, 795, 847, 893, 949, 1016, 1057, 1134, 1173, 1230, 1273, 1338]
}

const players=Object.keys(playerPoints)

const colors=[
'#E41A1C','#377EB8','#4DAF4A','#984EA3','#FF7F00',
'#A65628','#F781BF','#999999','#66C2A5','#FFD92F','#000000'
]

const selectedPlayers=new Set()

const datasets=players.map((name,index)=>({
label:name,
data:playerPoints[name],
borderColor:colors[index],
backgroundColor:colors[index],
fill:false,
pointBackgroundColor:colors[index],
pointBorderColor:colors[index],
pointBorderWidth:0,
borderWidth:2,
pointRadius:4,
pointHoverRadius:6
}))

const ctx=document.getElementById('fieberkurveChart').getContext('2d')

const chart=new Chart(ctx,{
type:'line',
data:{
labels:Array.from({length:34},(_,i)=>i+1),
datasets:datasets
},
options:{
responsive:true,
maintainAspectRatio:false,
plugins:{
legend:{
position:'top',
labels:{usePointStyle:true},
onClick:(e,legendItem)=>{
const clicked=legendItem.text

if(selectedPlayers.has(clicked)){
selectedPlayers.delete(clicked)
}else{
selectedPlayers.add(clicked)
}

chart.data.datasets.forEach(dataset=>{
const idx=players.indexOf(dataset.label)

if(selectedPlayers.size===0 || selectedPlayers.has(dataset.label)){
const color=colors[idx]
dataset.borderColor=color
dataset.backgroundColor=color
dataset.pointBackgroundColor=color
dataset.pointBorderColor=color
dataset.borderWidth=selectedPlayers.has(dataset.label)?3:2
dataset.pointRadius=selectedPlayers.has(dataset.label)?6:4
dataset.pointHoverRadius=selectedPlayers.has(dataset.label)?7:5
}else{
const grey='lightgrey'
dataset.borderColor=grey
dataset.backgroundColor=grey
dataset.pointBackgroundColor=grey
dataset.pointBorderColor=grey
dataset.borderWidth=1
dataset.pointRadius=3
dataset.pointHoverRadius=4
}
})

chart.update()
}
}
},
scales:{
x:{title:{display:true,text:'Spieltag'}},
y:{title:{display:true,text:'Punkte'},beginAtZero:true}
}
}
})

function segmentPoints(arr,start,end){
return arr[end-1]-(start>1?arr[start-2]:0)
}

const played=playerPoints[players[0]].length
const n=played-17

const firstHalfStandings=players.map(p=>({
name:p,
points:segmentPoints(playerPoints[p],1,n)
}))

firstHalfStandings.sort((a,b)=>b.points-a.points)

const secondHalfStandings=players.map(p=>{
const points=segmentPoints(playerPoints[p],18,17+n)
const firstPoints=firstHalfStandings.find(f=>f.name===p).points
return{
name:p,
points:points,
diff:points-firstPoints
}
})

secondHalfStandings.sort((a,b)=>b.points-a.points)

function createTable(title,matchLabel,dataArray,showDiff=false){

const wrapper=document.createElement('div')
wrapper.className='table-block'

const titleDiv=document.createElement('div')
titleDiv.className='table-title'
titleDiv.textContent=title

const table=document.createElement('table')

let html='<tr><th>Rang</th><th>Spieler</th><th>'+matchLabel+'</th>'
if(showDiff) html+='<th>Diff</th>'
html+='</tr>'

dataArray.forEach((d,i)=>{
html+='<tr>'
html+='<td>'+(i+1)+'</td>'
html+='<td>'+d.name+'</td>'
html+='<td>'+d.points+'</td>'
if(showDiff) html+='<td>'+((d.diff>0?'+':'')+d.diff)+'</td>'
html+='</tr>'
})

table.innerHTML=html

wrapper.appendChild(titleDiv)
wrapper.appendChild(table)

return wrapper
}

const container=document.getElementById('tablesContainer')

container.appendChild(
createTable('Hinrunde','Spieltag 1 bis '+n,firstHalfStandings)
)

container.appendChild(
createTable('Rückrunde','Spieltag 18 bis '+(17+n),secondHalfStandings,true)
)

</script>

</body>
</html>
