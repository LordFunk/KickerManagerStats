<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winning Teams</title>

<style>
:root {
  --primary: #0056b3;
  --background: #f4f4f9;
}

* {
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  background: var(--background);
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: var(--primary);
  margin-bottom: 30px;
}

.winning-teams {
  width: min(100%, 1000px);
}

.run-block {
  margin-bottom: 18px;
}

.run-block h4 {
  margin: 0 0 8px 0;
}

.run-block img {
  width: 100%;
  max-width: 700px;
  border-radius: 8px;
  cursor: pointer;
}

/* FULLSCREEN VIEWER */
.overlay {
  position: fixed;
  inset: 0;
  width: 100vw;
  height: 100vh;
  background: #000;
  display: flex;
  flex-direction: column;
  z-index: 9999;
  touch-action: none;
}

.overlay-header {
  color: white;
  text-align: center;
  padding: 12px 10px;
  font-size: 16px;
  font-weight: 600;
  flex: 0 0 auto;
}

.overlay-img-wrap {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.overlay-img-wrap img {
  width: 100vw;
  height: 100%;
  object-fit: contain;
  user-select: none;
  -webkit-user-drag: none;
}
</style>
</head>

<body>

<h1>Winning Teams</h1>

<main class="winning-teams">

<article class="winner-card">
  <h3>Saison 20/21 • Eirik</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="20-21-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="20-21-rueckrunde.png"></div>
</article>

<article class="winner-card">
  <h3>Saison 21/22 • Phil</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="21-22-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="21-22-rueckrunde.png"></div>
</article>

<article class="winner-card">
  <h3>Saison 22/23 • Erwin</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="22-23-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="22-23-rueckrunde.png"></div>
</article>

<article class="winner-card">
  <h3>Saison 23/24 • Markus</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="23-24-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="23-24-rueckrunde.png"></div>
</article>

<article class="winner-card">
  <h3>Saison 24/25 • Espen</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="24-25-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="24-25-rueckrunde.png"></div>
</article>

<article class="winner-card">
  <h3>Saison 25/26 • Markus</h3>
  <div class="run-block"><h4>Hinrunde</h4><img src="25-26-hinrunde.png"></div>
  <div class="run-block"><h4>Rückrunde</h4><img src="25-26-rueckrunde.png"></div>
</article>

</main>

<script>
const images = Array.from(document.querySelectorAll(".run-block img"));

const meta = images.map(img => {
  const season = img.closest("article").querySelector("h3").textContent;
  const type = img.closest(".run-block").querySelector("h4").textContent;
  return { src: img.src, label: season + " • " + type };
});

let index = 0;
let overlay = null;
let header = null;
let imgEl = null;
let startX = 0;

function update() {
  imgEl.src = meta[index].src;
  header.textContent = meta[index].label;
}

function openViewer(i) {
  index = i;

  overlay = document.createElement("div");
  overlay.className = "overlay";

  header = document.createElement("div");
  header.className = "overlay-header";

  const wrap = document.createElement("div");
  wrap.className = "overlay-img-wrap";

  imgEl = document.createElement("img");

  wrap.appendChild(imgEl);
  overlay.appendChild(header);
  overlay.appendChild(wrap);
  document.body.appendChild(overlay);

  update();

  overlay.addEventListener("click", () => {
    overlay.remove();
    overlay = null;
  });

  overlay.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
  }, { passive: true });

  overlay.addEventListener("touchend", e => {
    const diff = e.changedTouches[0].clientX - startX;

    if (Math.abs(diff) > 40) {
      index = diff > 0 ? index - 1 : index + 1;

      if (index < 0) index = meta.length - 1;
      if (index >= meta.length) index = 0;

      update();
    }
  }, { passive: true });
}

images.forEach((img, i) => {
  img.addEventListener("click", () => openViewer(i));
});
</script>

</body>
</html>
