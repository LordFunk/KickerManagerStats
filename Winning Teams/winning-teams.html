<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Winning Teams</title>

<style>
:root {
  --primary: #0056b3;
  --background: #f4f4f9;
  --card-bg: #ffffff;
  --shadow: 0 2px 10px rgba(0,0,0,0.08);
  --shadow-hover: 0 4px 16px rgba(0,0,0,0.12);
}

* {
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  line-height: 1.5;
  background-color: var(--background);
  margin: 0;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

h1 {
  color: var(--primary);
  margin-bottom: 30px;
}

.winning-teams {
  width: min(100%, 1000px);
}

.winner-card {
  background: var(--card-bg);
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.winner-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.winner-card h3 {
  margin-top: 0;
  margin-bottom: 15px;
}

.winner-images {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.winner-images img {
  width: 100%;
  max-width: 420px;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  border-radius: 8px;
  display: block;
}

@media (max-width: 900px) {
  .winner-images img {
    max-width: 100%;
  }
}
</style>
</head>

<body>

<h1>Winning Teams</h1>

<main class="winning-teams">

  <article class="winner-card">
    <h3>Saison 20/21 • Eirik</h3>
    <div class="winner-images">
      <img src="20-21-hinrunde.png" alt="20/21 Hinrunde" loading="lazy">
      <img src="20-21-rueckrunde.png" alt="20/21 Rückrunde" loading="lazy">
    </div>
  </article>

  <article class="winner-card">
    <h3>Saison 21/22 • Phil</h3>
    <div class="winner-images">
      <img src="21-22-hinrunde.png" alt="21/22 Hinrunde" loading="lazy">
      <img src="21-22-rueckrunde.png" alt="21/22 Rückrunde" loading="lazy">
    </div>
  </article>

  <article class="winner-card">
    <h3>Saison 22/23 • Erwin</h3>
    <div class="winner-images">
      <img src="22-23-hinrunde.png" alt="22/23 Hinrunde" loading="lazy">
      <img src="22-23-rueckrunde.png" alt="22/23 Rückrunde" loading="lazy">
    </div>
  </article>

  <article class="winner-card">
    <h3>Saison 23/24 • Markus</h3>
    <div class="winner-images">
      <img src="23-24-hinrunde.png" alt="23/24 Hinrunde" loading="lazy">
      <img src="23-24-rueckrunde.png" alt="23/24 Rückrunde" loading="lazy">
    </div>
  </article>

  <article class="winner-card">
    <h3>Saison 24/25 • Espen</h3>
    <div class="winner-images">
      <img src="24-25-hinrunde.png" alt="24/25 Hinrunde" loading="lazy">
      <img src="24-25-rueckrunde.png" alt="24/25 Rückrunde" loading="lazy">
    </div>
  </article>

  <article class="winner-card">
    <h3>Saison 25/26 • Markus</h3>
    <div class="winner-images">
      <img src="25-26-hinrunde.png" alt="25/26 Hinrunde" loading="lazy">
      <img src="25-26-rueckrunde.png" alt="25/26 Rückrunde" loading="lazy">
    </div>
  </article>

</main>

</body>
</html>
